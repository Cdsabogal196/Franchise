version: '3.8'

services:
  java_app:
    container_name: spring_app
    image: pee-java-app:1.0.0
    build: .
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=jdbc:postgresql://java_db:5432/franchise_db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=12345
    depends_on:
      - java_db

  java_db:
    container_name: postgresdb
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: franchise_db